description: >- # this means to ignore newlines until "baseurl:"
  Embark on a tech journey with me as we delve into the dynamic world of technology. 
  Together, let's explore coding intricacies and navigate the realm of tech support, sharing my knowledge and personal experiences along the way.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://gabrielpadilh4.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: gabpadilh4
